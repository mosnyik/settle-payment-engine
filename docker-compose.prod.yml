# =============================================================================
# Production Overrides
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (SSL Termination)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: payment-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/nginx/certbot:/var/www/certbot:ro
    depends_on:
      - payment-engine
    networks:
      - payment-network

  # ---------------------------------------------------------------------------
  # Certbot (SSL Certificate Renewal)
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: payment-certbot
    volumes:
      - ./backend/nginx/ssl:/etc/letsencrypt
      - ./backend/nginx/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - payment-network

  # Override payment-engine to not expose port directly
  payment-engine:
    ports: []  # Remove direct port exposure, nginx handles it

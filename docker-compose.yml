#   Development:  docker compose up -d
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Logs:         docker compose logs -f payment-engine
#   Stop:         docker compose down

services:
  payment-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment-engine
    restart: unless-stopped
    ports:
      - "${PORT:-3500}:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
      # Database
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-2settle_db}
      # Admin
      - ADMIN_SECRET=${ADMIN_SECRET}
      # External APIs
      - COINMARKETCAP_API_KEY=${COINMARKETCAP_API_KEY}
      - NUBAN_API_KEY=${NUBAN_API_KEY}
      # HD Wallet
      - HD_WALLET_ENABLED=${HD_WALLET_ENABLED:-false}
      - HD_SEED_PHRASE_ENCRYPTED=${HD_SEED_PHRASE_ENCRYPTED}
      - HD_SEED_ENCRYPTION_KEY=${HD_SEED_ENCRYPTION_KEY}
      - HOT_WALLET_BITCOIN=${HOT_WALLET_BITCOIN}
      - HOT_WALLET_ETHEREUM=${HOT_WALLET_ETHEREUM}
      - HOT_WALLET_TRON=${HOT_WALLET_TRON}
      # Sweeper
      - SWEEPER_ENABLED=${SWEEPER_ENABLED:-false}
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - BSC_RPC_URL=${BSC_RPC_URL}
      # Watcher
      - WATCHER_ENABLED=${WATCHER_ENABLED:-true}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY}
      - BSCSCAN_API_KEY=${BSCSCAN_API_KEY}
      - TRONGRID_API_KEY=${TRONGRID_API_KEY}
      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN}
      # Sweeper
      - SWEEPER_MAX_RETRIES=${SWEEPER_MAX_RETRIES:-3}
      - SWEEP_MIN_BTC=${SWEEP_MIN_BTC:-0.0001}
      - SWEEP_MIN_ETH=${SWEEP_MIN_ETH:-0.001}
      - SWEEP_MIN_BNB=${SWEEP_MIN_BNB:-0.01}
      - SWEEP_MIN_TRX=${SWEEP_MIN_TRX:-10}
      - SWEEP_MIN_USDT=${SWEEP_MIN_USDT:-1}
      - SWEEP_MIN_USDC=${SWEEP_MIN_USDC:-1}
      # Watcher
      - WATCHER_AMOUNT_TOLERANCE=${WATCHER_AMOUNT_TOLERANCE:-0.02}
      - WATCHER_MAX_SESSIONS_PER_POLL=${WATCHER_MAX_SESSIONS_PER_POLL:-100}
      - WATCHER_BITCOIN_POLL_MS=${WATCHER_BITCOIN_POLL_MS:-60000}
      - WATCHER_ETHEREUM_POLL_MS=${WATCHER_ETHEREUM_POLL_MS:-15000}
      - WATCHER_BSC_POLL_MS=${WATCHER_BSC_POLL_MS:-5000}
      - WATCHER_TRON_POLL_MS=${WATCHER_TRON_POLL_MS:-5000}
      # Settlement
      - SETTLEMENT_ENABLED=${SETTLEMENT_ENABLED:-false}
      - MONGORO_API_URL=${MONGORO_API_URL}
      - MONGORO_TOKEN=${MONGORO_TOKEN}
      - MONGORO_TRANSFERPIN=${MONGORO_TRANSFERPIN}
      - MONGORO_CALLBACK_URL=${MONGORO_CALLBACK_URL}
      - MONGORO_WEBHOOK_IPS=${MONGORO_WEBHOOK_IPS}
      # Paystack
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - PAYSTACK_WEBHOOK_SECRET=${PAYSTACK_WEBHOOK_SECRET}
      - PAYSTACK_LOW_BALANCE_THRESHOLD=${PAYSTACK_LOW_BALANCE_THRESHOLD:-100000}
      # Telegram
      - TELEGRAM_ALERTS_ENABLED=${TELEGRAM_ALERTS_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Security
      - HMAC_TIMESTAMP_TOLERANCE_MS=${HMAC_TIMESTAMP_TOLERANCE_MS:-300000}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - IP_WHITELIST_ENABLED=${IP_WHITELIST_ENABLED:-true}
      - AUDIT_LOG_ENABLED=${AUDIT_LOG_ENABLED:-true}
    networks:
      - payment-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3500/v1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  rate-updater:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment-rate-updater
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-2settle_db}
      - RATE_ROW_ID=${RATE_ROW_ID:-1}
    command: >
      /bin/sh -c "mkdir -p /app/logs &&
      while true; do
        node dist/scripts/run-rate-update.js >> /app/logs/rate-update.log 2>&1;
        sleep 1200;
      done"
    healthcheck:
      disable: true
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - payment-network

# Networks & Volumes
networks:
  payment-network:
    driver: bridge
